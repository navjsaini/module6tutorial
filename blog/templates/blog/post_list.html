{% extends 'blog/base.html' %}

{% block content %}

<h2>Blog Posts</h2>

{% for post in posts %}
    <div>
        <h3>
            <a href="{% url 'post_detail' pk=post.pk %}">
    Comments: {{ post.comments.count }}
</a>
        </h3>

        <p>{{ post.text }}</p>
        <p>Published: {{ post.published_date }}</p>
    </div>
    <hr>
{% endfor %}

{% endblock %}
